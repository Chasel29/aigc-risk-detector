<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">

    <title>AIGC检测平台</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>AIGC内容风险检测平台</h1>

        <form method="POST">

            <textarea
            name="content"
            rows="10"
            placeholder="请输入AIGC生成内容"></textarea>

            <br><br>

            <button type="submit">开始检测</button>

        </form>

        {% if result %}

        <div class="result">

            <h2>检测结果</h2>

            <p>{{ result }}</p>

        </div>

        {% endif %}

    </div>

</body>

</html>
